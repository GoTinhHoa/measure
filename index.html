<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Đo Gỗ v4">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Đo Gỗ V4</title>
    <link rel="stylesheet" href="style.css">
    <script>
        /* Force update khi phiên bản cũ — chạy trước mọi thứ */
        (function () {
            var APP_VERSION = "4.2";
            var stored = localStorage.getItem("appVersion");
            if (stored !== APP_VERSION) {
                localStorage.setItem("appVersion", APP_VERSION);
                if ("serviceWorker" in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function (regs) {
                        regs.forEach(function (r) { r.unregister(); });
                        caches.keys().then(function (keys) {
                            Promise.all(keys.map(function (k) { return caches.delete(k); })).then(function () {
                                location.reload(true);
                            });
                        });
                    });
                } else {
                    location.reload(true);
                }
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>
    <div id="toast" class="toast"></div>

    <!-- CONFIRM MODAL -->
    <div id="confirmModal" class="modalOverlay">
        <div class="modalCard">
            <div class="modalBody">
                <div class="modalIcon">⚠️</div>
                <div class="modalTitle" id="modalTitle"></div>
                <div class="modalDesc" id="modalDesc"></div>
                <input id="modalInput" style="display:none;width:100%;padding:10px 12px;border:2px solid #D4B896;border-radius:8px;font-size:16px;text-align:center;font-weight:700;margin-top:10px;outline:none;box-sizing:border-box;letter-spacing:2px" autocomplete="off" autocorrect="off">
                <div id="modalInputError" style="display:none;color:#DC2626;font-size:12px;margin-top:4px;font-weight:600"></div>
            </div>
            <div class="modalActions">
                <button class="btnCancel" onclick="closeConfirm()">Hủy</button>
                <button class="btnDanger" id="modalConfirmBtn">Xác nhận</button>
            </div>
        </div>
    </div>

    <!-- ACCESS SCREEN -->
    <div id="accessScreen">
        <div class="accessWrap">
        <div class="brandName">Gỗ Tinh Hoa</div>
        <div class="brandSub">Ứng dụng đo quy cách</div>
        <div class="accessCard">
            <div class="accessTitle">Truy cập ứng dụng</div>
            <div class="accessDesc">Nhập mã truy cập để sử dụng ứng dụng</div>
            <input id="accessInput" class="accessInput" placeholder="Nhập mã truy cập">
            <button id="accessBtn" class="accessBtn" onclick="checkAccessCode()">Xác nhận</button>
            <div id="accessLoading" class="accessLoading"></div>
            <div id="accessError" class="accessError"></div>
            <div id="deviceStatusMsg" style="display:none;margin-top:12px;padding:10px 12px;border-radius:8px;font-size:0.82rem;line-height:1.5"></div>
        </div>
        </div>
    </div>

    <!-- SETUP -->
    <div id="setup" class="screen active noZoom">
        <div class="header">
            <img src="logo-192.png" class="headerLogo">
            <span>Cấu hình kiện</span>
        </div>
        <div class="card">
            <div class="formGrid">
                <div>
                    <label class="fieldLabel">Mã kiện</label>
                    <input id="bundle" oninput="this.value=this.value.toUpperCase()" onblur="lookupBundle()">
                    <div id="bundleLookupStatus" style="font-size:11px;margin-top:3px;min-height:16px"></div>
                </div>
                <div style="position:relative">
                    <label class="fieldLabel">Loại gỗ</label>
                    <input id="woodType" placeholder="Chọn loại gỗ" autocomplete="off"
                        onfocus="showWoodSuggest()" oninput="onWoodTypeInput(this.value)">
                    <div id="woodSuggestList" class="woodSuggestList"></div>
                </div>
                <div>
                    <label class="fieldLabel">Độ dày (cm)</label>
                    <input id="thickness" type="number" step="any">
                </div>
                <div>
                    <label class="fieldLabel">Chất lượng</label>
                    <input id="quality" oninput="this.value=this.value.toUpperCase()">
                </div>
            </div>
            <div class="toggleRow" style="margin-top:16px;justify-content:space-between">
                <div style="display:flex;align-items:center;gap:10px">
                    <label class="toggle">
                        <input type="checkbox" id="woodUS" onchange="toggleWoodUS()">
                        <span class="toggleSlider"></span>
                    </label>
                    <span class="toggleLabel">Gỗ Mỹ</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <span class="toggleLabel" style="font-size:13px">Kiện nguyên</span>
                    <label class="toggle">
                        <input type="checkbox" id="measureTypeCheck" onchange="onMeasureTypeToggle()">
                        <span class="toggleSlider" id="measureTypeSlider"></span>
                    </label>
                    <span class="toggleLabel" style="font-size:13px;color:var(--tm,#9A8878)">Soạn lẻ</span>
                </div>
            </div>
            <div class="gridCountRow">
                <span class="gridCountLabel">Số nút / hàng</span>
                <button class="smallBtn" onclick="gridMinus()">−</button>
                <span class="gridCountVal" id="gridCount">6</span>
                <button class="smallBtn" onclick="gridPlus()">+</button>
            </div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:4px;">
            <button onclick="startMeasure()">Bắt đầu nhập</button>
            <button class="smallBtn" onclick="showSavedLists()">Lịch sử</button>
        </div>

        <!-- SAVED LISTS PANEL -->
        <div id="savedListsPanel" class="card" style="display:none;margin-top:12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <b style="font-size:13px;color:#9A8878;text-transform:uppercase;letter-spacing:0.5px">Lịch sử kiện</b>
                <button class="smallBtn" onclick="closeSavedLists()">Đóng</button>
            </div>
            <div id="savedListsContent"></div>
        </div>
    </div>

    <!-- MEASURE -->
    <div id="measure" class="screen noZoom">
        <div class="header">
            <img src="logo-192.png" class="headerLogo">
            <span id="headerInfo"></span>
        </div>
        <div class="card" style="display:flex;justify-content:space-between">
            <button class="smallBtn" onclick="go('setup')">← Cấu hình</button>
            <button class="smallBtn" onclick="confirmResetBoards()">Kiện mới</button>
            <button class="smallBtnBlue" onclick="showMatrix()">List →</button>
        </div>
        <div class="card">
            <div class="summaryBar">
                <span class="summaryText" id="summary"></span>
                <div style="display:flex;gap:6px;align-items:center">
                    <select id="turnSelect" class="turnSelect" onchange="onTurnSelect()"></select>
                    <button class="smallBtn" onclick="addNewTurn()">+ Lượt</button>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="panelHeader">
                <b>Dài (dm)</b>
                <div class="rangeGroup">
                    <div class="rangeControl">
                        <button class="smallBtn" onclick="lenMin--; rebuild(); saveState()">−</button>
                        <span id="lenMinLabel" class="rangeVal" onclick="editRange('lenMin')"></span>
                        <button class="smallBtn" onclick="lenMin++; rebuild(); saveState()">+</button>
                    </div>
                    <div class="rangeControl">
                        <button class="smallBtn" onclick="lenMax--; rebuild(); saveState()">−</button>
                        <span id="lenMaxLabel" class="rangeVal" onclick="editRange('lenMax')"></span>
                        <button class="smallBtn" onclick="lenMax++; rebuild(); saveState()">+</button>
                    </div>
                </div>
            </div>
            <div id="lenTabs" class="tabBar"></div>
            <div id="lengthGrid" class="grid"></div>
        </div>
        <div class="card">
            <div class="panelHeader">
                <b>Rộng (cm)</b>
                <div class="rangeGroup">
                    <div class="rangeControl">
                        <button class="smallBtn" onclick="widMin--; rebuild(); saveState()">−</button>
                        <span id="widMinLabel" class="rangeVal" onclick="editRange('widMin')"></span>
                        <button class="smallBtn" onclick="widMin++; rebuild(); saveState()">+</button>
                    </div>
                    <div class="rangeControl">
                        <button class="smallBtn" onclick="widMax--; rebuild(); saveState()">−</button>
                        <span id="widMaxLabel" class="rangeVal" onclick="editRange('widMax')"></span>
                        <button class="smallBtn" onclick="widMax++; rebuild(); saveState()">+</button>
                    </div>
                </div>
            </div>
            <div id="widTabs" class="tabBar"></div>
            <div id="widthGrid" class="grid disabled"></div>
        </div>
        <div class="card boardPanel">
            <div class="boardLeft">
                <div id="boardList" class="list"></div>
            </div>
            <div class="boardRight">
                <div id="turnSummary"></div>
            </div>
        </div>
    </div>

    <!-- MATRIX -->
    <div id="matrix" class="screen">
        <div class="header">
            <img src="logo-192.png" class="headerLogo">
            <span>List chi tiết</span>
        </div>
        <div class="card matrixToolbar">
            <button class="smallBtn" onclick="go('measure')">← Quay lại</button>
            <button class="smallBtnBlue" onclick="shareMatrixZalo()">Chia sẻ Zalo</button>
        </div>
        <div id="matrixCaptureArea">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
                    <div style="flex:1;min-width:0">
                        <div id="matrixHeader"></div>
                        <div class="matrixStats">
                            <span id="matrixPieces"></span>
                            <span id="matrixVolume"></span>
                        </div>
                    </div>
                    <div style="text-align:right;flex-shrink:0;white-space:nowrap">
                        <div id="matrixDate"></div>
                        <select id="bundleStatus" class="bundleStatus">
                            <option value="-">-</option>
                            <option value="Kiện lẻ">Kiện lẻ</option>
                            <option value="Lẻ hết">Lẻ hết</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="matrix card" id="matrixContainer"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
